# Гибрид: API + бот на VPS, Mini App на GitHub Pages
services:
  postgres:
    image: postgres:16-alpine
    container_name: navigai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-navigai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-navigai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-navigai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M

  redis:
    image: redis:7-alpine
    container_name: navigai-redis
    restart: unless-stopped
    command: redis-server --maxmemory 96mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    container_name: navigai-osrm
    restart: unless-stopped
    command: osrm-routed --algorithm mld --ip 0.0.0.0 --port 5000 /data/map.osrm
    volumes:
      - osrm_data:/data:ro
    expose:
      - "5000"
    deploy:
      resources:
        limits:
          memory: 512M

  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: navigai-whisper
    restart: unless-stopped
    profiles:
      - whisper
    environment:
      WHISPER__MODEL: ${WHISPER_MODEL:-small}
      WHISPER__INFERENCE_DEVICE: cpu
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          memory: 768M

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: navigai-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-navigai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-navigai}
      REDIS_URL: redis://redis:6379/0
      OSRM_BASE_URL: http://osrm:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --workers 1"
    deploy:
      resources:
        limits:
          memory: 512M

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: bot
    container_name: navigai-bot
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-navigai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-navigai}
      REDIS_URL: redis://redis:6379/0
      API_BASE_URL: http://backend:8000
      BOT_PORT: 8081
    depends_on:
      - backend
      - redis
    volumes:
      - uploads_data:/app/uploads
    deploy:
      resources:
        limits:
          memory: 256M

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: navigai-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-navigai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-navigai}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - backend
    command: python -m backend.app.worker
    deploy:
      resources:
        limits:
          memory: 256M

  caddy:
    image: caddy:2-alpine
    container_name: navigai-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - bot
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  osrm_data:
  caddy_data:
  caddy_config:
