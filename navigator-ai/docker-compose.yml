# НавигаторAI — production-ready stack для VPS (2 CPU / 4 GB RAM)
services:
  postgres:
    image: postgres:16-alpine
    container_name: navigai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-navigai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-navigai_secret}
      POSTGRES_DB: ${POSTGRES_DB:-navigai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-navigai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: navigai-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: navigai-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-navigai}:${POSTGRES_PASSWORD:-navigai_secret}@postgres:5432/${POSTGRES_DB:-navigai}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --workers 1"
    deploy:
      resources:
        limits:
          memory: 768M

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: bot
    container_name: navigai-bot
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-navigai}:${POSTGRES_PASSWORD:-navigai_secret}@postgres:5432/${POSTGRES_DB:-navigai}
      REDIS_URL: redis://redis:6379/0
      API_BASE_URL: http://backend:8000
      BOT_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      - backend
      - redis
    volumes:
      - uploads_data:/app/uploads
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: navigai-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-navigai}:${POSTGRES_PASSWORD:-navigai_secret}@postgres:5432/${POSTGRES_DB:-navigai}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - backend
    command: python -m backend.app.worker
    deploy:
      resources:
        limits:
          memory: 384M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: navigai-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M

  nginx:
    image: nginx:alpine
    container_name: navigai-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
      - bot
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_data:
  redis_data:
  uploads_data:
