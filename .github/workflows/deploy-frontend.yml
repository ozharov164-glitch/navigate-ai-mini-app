name: Deploy Mini App to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "navigator-ai/frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: navigator-ai/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: navigator-ai/frontend/package-lock.json

      - name: Install & build
        env:
          VITE_API_URL: https://31-128-42-170.sslip.io/api
          VITE_BASE_PATH: /navigate-ai-mini-app/
        run: |
          npm ci
          npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: navigator-ai/frontend/dist
          publish_branch: gh-pages
