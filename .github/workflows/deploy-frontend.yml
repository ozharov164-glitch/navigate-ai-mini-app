name: Deploy Mini App to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "navigator-ai/frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: navigator-ai/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: navigator-ai/frontend/package-lock.json

      - name: Install & build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || secrets.VITE_API_URL || 'https://31-128-42-170.sslip.io' }}
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/navigate-ai-mini-app/' }}
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: navigator-ai/frontend/dist

  deploy:
    needs: build-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
